  - Medical Billing
  - Patient Scheduling
  - Clinical Data
  - Insurance Eligibility
  - HIPAA
apis:
  - aid: kareo:kareo-soap-api
    name: Kareo Integration SOAP API
    description: >-
      The Kareo Integration SOAP API provides a web services interface for
      integrating third-party applications with practice management data.
      Supports read access to patients, providers, appointments, transactions,
      and charges, as well as write access to patients and encounters.
      Authentication requires a username, password, and a Customer Key issued
      by a System Administrator.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://helpme.tebra.com/01_Kareo_PM/12_API_and_Integration
    baseURL: https://webservice.kareo.com/services/soap/2.1/KareoServices.svc
    tags:
      - SOAP
      - Practice Management
      - Billing
      - Patients
      - Appointments
      - Encounters
    properties:
      - type: Documentation
        url: https://helpme.tebra.com/01_Kareo_PM/12_API_and_Integration
      - type: WSDL
        url: https://webservice.kareo.com/services/soap/2.1/KareoServices.svc?wsdl
      - type: TermsOfService
        url: https://www.tebra.com/api-terms-of-use/
  - aid: kareo:kareo-clinical-open-api
    name: Kareo Clinical Open API
    description: >-
      The Kareo Clinical Open API provides REST-based access to EHR clinical
      data, exposing patient clinical records, MACRA/MIPS reporting data, and
      related healthcare information. The API is documented with a Swagger UI
      interface and is accessible via api.kareo.com.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://api.kareo.com/clinical/v1/swagger/
    baseURL: https://api.kareo.com/clinical/v1
    tags:
      - REST
      - Clinical
      - EHR
      - MACRA
      - MIPS
      - OpenAPI
    properties:
      - type: Documentation
        url: https://api.kareo.com/clinical/v1/swagger/
